name: CI â€” V2V Intersection Nav

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # ----------------------------------------------------------------
  # Lint
  # ----------------------------------------------------------------
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 .

  # ----------------------------------------------------------------
  # Unit Tests
  # ----------------------------------------------------------------
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    env:
      MPLBACKEND: Agg

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install "pytest>=7.0" "pytest-cov>=4.0" "coverage[toml]>=7.2"

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short

      - name: Run unit tests with coverage (3.11 only)
        if: matrix.python-version == '3.11'
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=ai_predictor --cov=communication \
            --cov=fcfs --cov=rsu \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ----------------------------------------------------------------
  # Simulation Smoke Test
  # ----------------------------------------------------------------
  smoke:
    name: Simulation Smoke Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scenario_1 (no visualise â€” headless)
        run: |
          python main.py --scenario scenario_1 --visualize False --debug

      - name: Run scenario_2 (no visualise â€” headless)
        run: |
          python main.py --scenario scenario_2 --visualize False

      - name: Generate dataset (100 rows smoke test)
        run: |
          python dataset_generator.py --samples 100 --output data/smoke_dataset.csv

      - name: Evaluate latest results
        run: |
          python evaluation.py \
            --results "$(ls -t data/simulation_scenario_1_*.json | head -1)"

      - name: Upload simulation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: |
            data/*.json
            outputs/*.png



