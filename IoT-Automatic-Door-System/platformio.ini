; PlatformIO project configuration
; Alternative to Arduino IDE — use: pio run --target upload

[env:esp32dev]
platform      = espressif32
board         = esp32dev
framework     = arduino

; Serial monitor baud rate (matches SERIAL_BAUD in config.h)
monitor_speed = 115200

; Libraries (auto-installed)
lib_deps =
    miguelbalboa/MFRC522 @ ^1.4.10
    madhephaestus/ESP32Servo @ ^0.13.0
    knolleary/PubSubClient @ ^2.8.0
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
    bblanchon/ArduinoJson @ ^7.0.0

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_HAS_PSRAM

; OTA upload (after first flash)
; pio run --target upload --upload-port esp32-door.local

[env:esp32dev_ota]
extends       = env:esp32dev
upload_protocol = espota
upload_port   = esp32-door.local
upload_flags  =
    --auth=ota_password
