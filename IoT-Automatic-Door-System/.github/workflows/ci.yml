name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask paho-mqtt pytest pytest-cov

      - name: Run sensor logic unit tests
        run: pytest tests/test_sensor_logic.py -v

      - name: Run backend API tests
        run: pytest tests/test_backend_api.py -v

      - name: Run MQTT client tests
        run: pytest tests/test_mqtt_client.py -v

      - name: Run all tests with coverage
        run: |
          pytest tests/test_sensor_logic.py tests/test_backend_api.py tests/test_mqtt_client.py \
            --cov=backend --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install flake8
        run: pip install flake8
      - name: Lint Python files
        run: |
          flake8 backend/ tests/ \
            --max-line-length=100 \
            --exclude=__pycache__,.venv \
            --ignore=E501,W503
